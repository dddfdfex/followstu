<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Brothers Studio – بوابة المساعد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Poppins', sans-serif; }
    :root {
      --bg: #0A0E17; --card: rgba(17,24,39,0.9); --border: #1F2A3A; --text: #F3F4F6; --accent: #5B5FEF; --success: #19C37D; --warning: #F59E0B; --error: #FF5A5A;
      --radius: 20px; --radius-sm: 12px;
    }
    body { background: var(--bg); color: var(--text); }
    .header { background: #0F1622; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .logo { font-size: 24px; font-weight: 900; color: var(--accent); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .card { background: var(--card); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
    .btn { padding: 10px 24px; border-radius: var(--radius-sm); border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--success); color: white; }
    .btn-danger { background: var(--error); color: white; }
    .btn-warning { background: var(--warning); color: black; }
    .btn-sm { padding: 6px 16px; font-size: 13px; }
    .flex { display: flex; gap: 16px; flex-wrap: wrap; margin: 20px 0; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .attended-item { background: rgba(25,195,125,0.1); border-radius: 8px; padding: 8px 12px; margin: 6px 0; }
    .scanner-area { background: #000; border-radius: 20px; overflow: hidden; margin-top: 20px; }
    .badge { padding: 4px 12px; border-radius: 30px; font-size: 12px; }
    .badge-green { background: rgba(25,195,125,0.2); color: var(--success); }
    .badge-red { background: rgba(255,90,90,0.2); color: var(--error); }
    .footer { text-align: center; padding: 20px; font-size: 11px; color: #6B7280; border-top: 1px solid var(--border); margin-top: 40px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="header"><div class="logo"><i class="fa-solid fa-chalkboard-user"></i> BROTHERS STUDIO – المساعد</div><button class="btn btn-sm" id="logoutBtn" style="background:rgba(255,255,255,0.1);"><i class="fa-solid fa-sign-out-alt"></i> خروج</button></div>
<div class="container">
  <div id="loginSection">
    <div class="card" style="max-width: 400px; margin: 40px auto;">
      <h3>دخول المساعد</h3>
      <input type="password" id="assistantCode" class="field" placeholder="الكود الخاص" style="width:100%; padding:12px; margin:16px 0; background:#0f1419; border:1px solid var(--border); border-radius:12px; color:white;">
      <button class="btn btn-primary" id="assistantLoginBtn" style="width:100%">دخول</button>
      <div id="loginError" style="color:var(--error); margin-top:12px; display:none;"></div>
    </div>
  </div>
  <div id="dashboardSection" style="display:none;">
    <div class="grid">
      <div class="card"><i class="fa-solid fa-users"></i> <strong>مجموعتي:</strong> <span id="groupName">---</span></div>
      <div class="card"><i class="fa-solid fa-hourglass-half"></i> <strong>حالة الجلسة:</strong> <span id="sessionStatus" class="badge badge-red">لا توجد جلسة مفتوحة</span></div>
    </div>
    <div class="flex">
      <button class="btn btn-primary" id="startSessionBtn"><i class="fa-solid fa-play"></i> بدء الجلسة</button>
      <button class="btn btn-secondary" id="scanQrBtn"><i class="fa-solid fa-camera"></i> مسح QR</button>
      <button class="btn btn-secondary" id="manualEntryBtn"><i class="fa-solid fa-keyboard"></i> إدخال يدوي</button>
      <button class="btn btn-warning" id="voidRequestBtn"><i class="fa-solid fa-shield-alt"></i> طلب Void</button>
      <button class="btn btn-danger" id="closeSessionBtn"><i class="fa-solid fa-lock"></i> تقفيل الجلسة</button>
    </div>
    <div id="qrScanner" style="display:none;">
      <div id="reader" style="width:100%; max-width:500px;"></div>
      <button class="btn btn-sm" id="stopScanner">إغلاق الكاميرا</button>
    </div>
    <div id="manualInput" style="display:none; background: var(--card); padding: 16px; border-radius: var(--radius-sm); margin: 16px 0;">
      <input type="text" id="manualUid" placeholder="أدخل UID أو رقم الطالب" style="width:100%; padding:12px; background:#0f1419; border:1px solid var(--border); border-radius:12px; color:white;">
      <button class="btn btn-primary btn-sm" id="submitManual" style="margin-top:12px;">تسجيل الحضور</button>
    </div>
    <div class="card">
      <h4><i class="fa-solid fa-check-circle"></i> الحضور المسجل</h4>
      <div id="attendedStudentsList"></div>
      <h4 style="margin-top:20px;"><i class="fa-solid fa-notes-medical"></i> ملاحظات الجلسة</h4>
      <textarea id="sessionNotes" rows="3" style="width:100%; background:#0f1419; border:1px solid var(--border); border-radius:12px; color:white; padding:10px;" placeholder="أي ملاحظات عن الجلسة..."></textarea>
      <button class="btn btn-secondary btn-sm" id="saveNotesBtn" style="margin-top:8px;">حفظ الملاحظات</button>
    </div>
  </div>
</div>
<div class="footer">BROTHERS STUDIO ATTENDANCE SYSTEM - POWERED BY BROTHERS STUDIO - DEVELOPED BY ZIAD ELDRY - VERSION 1.0.0</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAMBxp98hk1C9K7sEF8et0JpwzLWjTPZ_4",
    authDomain: "omnia-store-7c8e4.firebaseapp.com",
    databaseURL: "https://omnia-store-7c8e4-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "omnia-store-7c8e4",
    storageBucket: "omnia-store-7c8e4.firebasestorage.app",
    messagingSenderId: "840762940236",
    appId: "1:840762940236:web:b5ea870c11e475e9ab8de9"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let currentAssistant = null;
  let currentGroup = null;
  let currentSessionKey = null;
  let html5QrCode = null;

  function showToast(msg, isError = false) {
    let toast = document.createElement('div');
    toast.innerText = msg;
    toast.style.position = 'fixed';
    toast.style.bottom = '20px';
    toast.style.left = '20px';
    toast.style.backgroundColor = isError ? '#FF5A5A' : '#19C37D';
    toast.style.color = 'white';
    toast.style.padding = '12px 20px';
    toast.style.borderRadius = '12px';
    toast.style.zIndex = '9999';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  document.getElementById('assistantLoginBtn').onclick = async () => {
    let code = document.getElementById('assistantCode').value;
    let assRef = await db.ref('app_configurations/assistants').once('value');
    let assistants = assRef.val() || {};
    let found = null;
    for (let [id, as] of Object.entries(assistants)) {
      if (as.code === code) { found = { id, ...as }; break; }
    }
    if (found) {
      currentAssistant = found;
      sessionStorage.setItem('assistant', JSON.stringify(found));
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboardSection').style.display = 'block';
      await loadGroupData(found.group_reference);
      checkCurrentSession();
    } else {
      let err = document.getElementById('loginError');
      err.innerText = '❌ كود غير صحيح';
      err.style.display = 'block';
      setTimeout(() => err.style.display = 'none', 2000);
    }
  };

  async function loadGroupData(groupId) {
    let groupSnap = await db.ref(`app_configurations/groups/${groupId}`).once('value');
    currentGroup = groupSnap.val() ? { id: groupId, ...groupSnap.val() } : null;
    document.getElementById('groupName').innerText = currentGroup?.title || 'غير محدد';
  }

  async function checkCurrentSession() {
    let sessionsSnap = await db.ref('attendance_sessions').once('value');
    let sessions = sessionsSnap.val() || {};
    for (let [key, sess] of Object.entries(sessions)) {
      if (sess.assistantId === currentAssistant.id && sess.is_open === true) {
        currentSessionKey = key;
        document.getElementById('sessionStatus').innerHTML = '<span class="badge badge-green">جلسة مفتوحة</span>';
        loadAttendedStudents();
        loadSessionNotes();
        return;
      }
    }
    currentSessionKey = null;
    document.getElementById('sessionStatus').innerHTML = '<span class="badge badge-red">لا توجد جلسة مفتوحة</span>';
    document.getElementById('attendedStudentsList').innerHTML = '<p>لا يوجد حضور بعد</p>';
  }

  document.getElementById('startSessionBtn').onclick = async () => {
    if (!currentAssistant || !currentGroup) return;
    if (currentSessionKey) { showToast('يوجد جلسة مفتوحة بالفعل', true); return; }
    let newSessionRef = db.ref('attendance_sessions').push();
    currentSessionKey = newSessionRef.key;
    await newSessionRef.set({
      assistantId: currentAssistant.id,
      assistantName: currentAssistant.name,
      groupId: currentGroup.id,
      groupTitle: currentGroup.title,
      is_open: true,
      startTime: firebase.database.ServerValue.TIMESTAMP,
      attended: {},
      notes: ''
    });
    showToast('تم فتح الجلسة بنجاح');
    document.getElementById('sessionStatus').innerHTML = '<span class="badge badge-green">جلسة مفتوحة</span>';
  };

  async function markAttendance(studentUid) {
    if (!currentSessionKey) { showToast('لا توجد جلسة مفتوحة', true); return false; }
    let studentSnap = await db.ref(`students_directory/${studentUid}`).once('value');
    let student = studentSnap.val();
    if (!student) { showToast('الطالب غير موجود', true); return false; }
    if (student.wallet_balance <= 0) { showToast('الرصيد غير كافٍ', true); return false; }
    let attendedRef = db.ref(`attendance_sessions/${currentSessionKey}/attended/${studentUid}`);
    let already = await attendedRef.once('value');
    if (already.exists()) { showToast('تم تسجيل هذا الطالب بالفعل', true); return false; }
    // خصم حصة وتسجيل الحضور
    let newBalance = student.wallet_balance - 1;
    await db.ref(`students_directory/${studentUid}/wallet_balance`).set(newBalance);
    await attendedRef.set({
      timestamp: firebase.database.ServerValue.TIMESTAMP,
      balanceBefore: student.wallet_balance,
      name: student.name
    });
    // تسجيل في attendance_ledger للتقارير
    let today = new Date().toISOString().slice(0,10);
    await db.ref(`attendance_ledger/${currentGroup.id}/${today}/${studentUid}`).set({ name: student.name, time: new Date().toISOString() });
    showToast(`✅ تم تسجيل حضور ${student.name}`);
    loadAttendedStudents();
    return true;
  }

  async function loadAttendedStudents() {
    if (!currentSessionKey) return;
    let attendedSnap = await db.ref(`attendance_sessions/${currentSessionKey}/attended`).once('value');
    let attended = attendedSnap.val() || {};
    let container = document.getElementById('attendedStudentsList');
    if (Object.keys(attended).length === 0) { container.innerHTML = '<p>لا يوجد حضور بعد</p>'; return; }
    let html = '';
    for (let [uid, data] of Object.entries(attended)) {
      html += `<div class="attended-item"><i class="fa-solid fa-user-check"></i> ${data.name || uid} - الساعة: ${new Date(data.timestamp).toLocaleTimeString()}</div>`;
    }
    container.innerHTML = html;
  }

  async function loadSessionNotes() {
    if (!currentSessionKey) return;
    let notesSnap = await db.ref(`attendance_sessions/${currentSessionKey}/notes`).once('value');
    document.getElementById('sessionNotes').value = notesSnap.val() || '';
  }
  document.getElementById('saveNotesBtn').onclick = async () => {
    if (!currentSessionKey) return;
    let notes = document.getElementById('sessionNotes').value;
    await db.ref(`attendance_sessions/${currentSessionKey}/notes`).set(notes);
    showToast('تم حفظ الملاحظات');
  };

  // QR Scanner
  document.getElementById('scanQrBtn').onclick = () => {
    document.getElementById('qrScanner').style.display = 'block';
    if (html5QrCode) html5QrCode.stop().catch(e=>console.log);
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (decodedText) => {
      await markAttendance(decodedText);
      html5QrCode.stop();
      document.getElementById('qrScanner').style.display = 'none';
    }, (err) => { console.warn(err); });
  };
  document.getElementById('stopScanner')?.addEventListener('click', () => {
    if (html5QrCode) html5QrCode.stop();
    document.getElementById('qrScanner').style.display = 'none';
  });

  document.getElementById('manualEntryBtn').onclick = () => { document.getElementById('manualInput').style.display = 'block'; };
  document.getElementById('submitManual').onclick = async () => {
    let uid = document.getElementById('manualUid').value.trim();
    if (uid) await markAttendance(uid);
    document.getElementById('manualUid').value = '';
  };

  document.getElementById('voidRequestBtn').onclick = async () => {
    let studentUid = prompt('أدخل UID الطالب لطلب Void:');
    let reason = prompt('سبب الطلب:');
    if (studentUid && reason) {
      let studentSnap = await db.ref(`students_directory/${studentUid}`).once('value');
      if (!studentSnap.exists()) { showToast('الطالب غير موجود', true); return; }
      await db.ref('void_requests').push({
        student_uid: studentUid,
        student_name: studentSnap.val().name,
        assistant_id: currentAssistant.id,
        assistant_name: currentAssistant.name,
        reason: reason,
        date: new Date().toISOString().slice(0,10),
        status: 'pending'
      });
      showToast('تم إرسال طلب Void إلى الإدارة');
    }
  };

  document.getElementById('closeSessionBtn').onclick = async () => {
    if (!currentSessionKey) { showToast('لا توجد جلسة مفتوحة', true); return; }
    // مراجعة الجلسة
    let attendedSnap = await db.ref(`attendance_sessions/${currentSessionKey}/attended`).once('value');
    let attended = attendedSnap.val() || {};
    let groupStudentsSnap = await db.ref('students_directory').once('value');
    let allStudents = groupStudentsSnap.val() || {};
    let presentList = [], absentList = [];
    for (let [uid, stu] of Object.entries(allStudents)) {
      if (stu.group_reference === currentGroup.id) {
        if (attended[uid]) presentList.push(stu.name);
        else absentList.push(stu.name);
      }
    }
    // إنشاء ملفات Excel
    let wsPresent = XLSX.utils.json_to_sheet(presentList.map(n=>({ 'اسم الطالب': n })));
    let wsAbsent = XLSX.utils.json_to_sheet(absentList.map(n=>({ 'اسم الطالب': n })));
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, wsPresent, 'الحضور');
    XLSX.utils.book_append_sheet(wb, wsAbsent, 'الغياب');
    XLSX.writeFile(wb, `جلسة_${currentGroup.title}_${new Date().toISOString().slice(0,10)}.xlsx`);
    // إغلاق الجلسة
    await db.ref(`attendance_sessions/${currentSessionKey}`).update({ is_open: false, endTime: firebase.database.ServerValue.TIMESTAMP });
    currentSessionKey = null;
    document.getElementById('sessionStatus').innerHTML = '<span class="badge badge-red">لا توجد جلسة مفتوحة</span>';
    document.getElementById('attendedStudentsList').innerHTML = '<p>تم تقفيل الجلسة</p>';
    showToast('تم تقفيل الجلسة بنجاح، تم تحميل ملفي الحضور والغياب');
  };

  document.getElementById('logoutBtn').onclick = () => { sessionStorage.clear(); location.reload(); };

  if (sessionStorage.getItem('assistant')) {
    let saved = JSON.parse(sessionStorage.getItem('assistant'));
    currentAssistant = saved;
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dashboardSection').style.display = 'block';
    loadGroupData(saved.group_reference).then(() => checkCurrentSession());
  }
</script>
</body>
</html>
