<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brothers Studio — قارئ الحضور</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.18.6/index.min.js"></script>
<style>
:root{
  --bg:#03080e;--bg2:#060d16;
  --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --blue:#3b82f6;--blue2:#60a5fa;
  --green:#10b981;--green2:#34d399;
  --red:#ef4444;--red2:#f87171;
  --gold:#f59e0b;--gold2:#fbbf24;
  --text:#eef4ff;--muted:#64748b;--muted2:#94a3b8;
  --radius:16px;--radius-sm:12px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ====== LOGIN ====== */
#login-view{
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background:radial-gradient(ellipse 70% 60% at 50% 30%,rgba(59,130,246,0.12) 0%,transparent 70%),var(--bg);
}
.login-card{
  background:var(--surface2);border:1px solid var(--border2);border-radius:24px;
  padding:40px 28px;max-width:380px;width:100%;text-align:center;
  box-shadow:0 40px 80px rgba(0,0,0,0.7);
}
.login-logo-wrap{margin-bottom:24px;}
.login-logo-wrap img{width:72px;height:72px;border-radius:18px;object-fit:cover;box-shadow:0 10px 28px rgba(59,130,246,0.4);}
.login-logo-icon{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto;box-shadow:0 10px 28px rgba(59,130,246,0.4);}
.login-card h1{font-size:22px;font-weight:900;background:linear-gradient(135deg,#fff,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.role-badge{display:inline-block;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:#93c5fd;padding:5px 16px;border-radius:20px;font-size:11px;font-weight:700;margin:12px 0 24px;letter-spacing:.5px;}
.f-ctrl{width:100%;padding:14px 16px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Cairo',sans-serif;font-size:15px;outline:none;transition:all .25s;text-align:center;letter-spacing:6px;font-weight:900;font-size:22px;}
.f-ctrl:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,0.2);}
.f-ctrl-n{letter-spacing:0;font-size:18px;font-weight:800;}
.form-group{margin-bottom:14px;text-align:right;}
.form-group label{font-size:12px;font-weight:700;color:var(--muted2);display:block;margin-bottom:6px;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:15px 22px;border:none;border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;width:100%;margin-top:10px;}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(59,130,246,0.4);}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff;}
.btn-warning{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;}
.btn-ghost{background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);}
.btn-ghost:hover{color:var(--text);}
.btn-icon{padding:14px;border-radius:var(--radius-sm);width:auto;font-size:18px;}
.err-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;border-radius:10px;padding:12px;font-size:13px;margin-bottom:14px;display:none;}

/* ====== APP ====== */
#app-shell{display:none;min-height:100vh;display:none;flex-direction:column;}

/* HEADER */
.app-header{
  background:rgba(3,8,14,0.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.app-header-brand{display:flex;align-items:center;gap:10px;}
.app-header-brand img{width:34px;height:34px;border-radius:8px;object-fit:cover;}
.app-header-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:15px;}
.app-header-title{font-size:15px;font-weight:900;line-height:1.1;}
.app-header-sub{font-size:10px;color:var(--blue2);}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);padding:6px 12px;border-radius:20px;}
.user-chip span{font-size:12px;font-weight:700;}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* CONTENT */
.app-content{flex:1;padding:18px;display:flex;flex-direction:column;gap:16px;max-width:500px;margin:0 auto;width:100%;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);}
.card-title{font-size:13px;font-weight:800;color:#94a3b8;margin-bottom:14px;display:flex;align-items:center;gap:8px;letter-spacing:.3px;}
.card-title i{color:var(--blue2);}

/* SCAN AREA */
.scan-area{
  background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(29,78,216,0.04));
  border:2px dashed rgba(59,130,246,0.3);border-radius:var(--radius);
  padding:28px 20px;text-align:center;
}
.scan-icon{font-size:48px;margin-bottom:12px;opacity:.8;}
.scan-label{font-size:14px;font-weight:700;color:var(--muted2);margin-bottom:4px;}
.scan-sub{font-size:12px;color:var(--muted);}

/* RESULT CARD */
.result-card{border-radius:var(--radius);padding:18px;display:none;animation:popIn .3s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.result-card.success{background:rgba(16,185,129,0.1);border:2px solid rgba(16,185,129,0.3);}
.result-card.error{background:rgba(239,68,68,0.1);border:2px solid rgba(239,68,68,0.3);}
.result-card.already{background:rgba(245,158,11,0.1);border:2px solid rgba(245,158,11,0.3);}
.result-icon{font-size:36px;margin-bottom:8px;}
.result-title{font-size:16px;font-weight:900;margin-bottom:4px;}
.result-subtitle{font-size:13px;color:var(--muted2);}
.student-info-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08);}
.student-info-label{font-size:11px;color:var(--muted2);font-weight:600;}
.student-info-val{font-size:14px;font-weight:800;}

/* CAMERA */
.camera-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;
  display:none;flex-direction:column;align-items:center;justify-content:center;
}
.camera-overlay.open{display:flex;}
.camera-frame{width:min(90vw,400px);aspect-ratio:1;border-radius:var(--radius);overflow:hidden;position:relative;border:3px solid var(--blue2);}
.camera-frame video{width:100%;height:100%;object-fit:cover;}
.camera-corners::before,.camera-corners::after{content:'';position:absolute;width:30px;height:30px;border-color:var(--blue2);border-style:solid;}
.cam-status{margin-top:16px;font-size:14px;color:var(--muted2);font-weight:600;text-align:center;padding:0 20px;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),transparent);animation:scanMove 2s linear infinite;top:0;}
@keyframes scanMove{0%{top:0}100%{top:100%}}

/* LOG */
.log-list{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;}
.log-item{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(0,0,0,0.2);border-radius:10px;font-size:12px;}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.log-dot.success{background:var(--green);}
.log-dot.err{background:var(--red);}
.log-dot.already{background:var(--gold);}
.log-info{flex:1;}
.log-name{font-weight:700;}
.log-time{font-size:10px;color:var(--muted);}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-blue{background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.25);}
.badge-green{background:rgba(16,185,129,0.15);color:#6ee7b7;border:1px solid rgba(16,185,129,0.25);}

/* BOTTOM TAB */
.bottom-tab{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(3,8,14,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);
  display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));
}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px;cursor:pointer;color:var(--muted);font-size:11px;font-weight:700;transition:all .2s;}
.tab-item.active{color:var(--blue2);}
.tab-item i{font-size:20px;}

.app-content{padding-bottom:80px;}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-view">
  <div class="login-card">
    <div class="login-logo-wrap">
      <img src="logo.png" onerror="this.style.display='none';document.getElementById('ll-icon').style.display='flex'">
      <div class="login-logo-icon" id="ll-icon" style="display:none">📡</div>
    </div>
    <h1>Brothers Studio</h1>
    <div class="role-badge">📡 &nbsp;قارئ الحضور</div>
    <p style="color:var(--muted2);font-size:13px;margin-bottom:24px">سجّل دخولك بكودك الخاص</p>
    <div id="login-error" class="err-box"></div>
    <div class="form-group" style="text-align:right">
      <label>كودك السري</label>
      <input type="password" id="login-pass" class="f-ctrl f-ctrl-n" placeholder="••••" maxlength="12" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> دخول</button>
  </div>
</div>

<!-- APP -->
<div id="app-shell" style="display:none">

  <header class="app-header">
    <div class="app-header-brand">
      <img src="logo.png" onerror="this.style.display='none';document.getElementById('h-icon').style.display='flex'">
      <div class="app-header-icon" id="h-icon" style="display:none">📡</div>
      <div>
        <div class="app-header-title">Brothers Studio</div>
        <div class="app-header-sub">قارئ الحضور</div>
      </div>
    </div>
    <div class="user-chip">
      <div class="user-dot"></div>
      <span id="header-user-name">—</span>
    </div>
  </header>

  <!-- VIEW: SCAN -->
  <div class="app-content" id="view-scan" style="display:flex">
    <div class="scan-area">
      <div class="scan-icon">📷</div>
      <div class="scan-label">مسح باركود الطالب</div>
      <div class="scan-sub">اضغط لتشغيل الكاميرا أو أدخل الكود يدويًا</div>
      <button class="btn btn-primary" style="max-width:260px;margin:16px auto 0" onclick="openCamera()"><i class="fa-solid fa-camera"></i> تشغيل الكاميرا</button>
    </div>

    <div class="card">
      <div class="card-title"><i class="fa-solid fa-keyboard"></i> إدخال يدوي</div>
      <input type="text" class="f-ctrl f-ctrl-n" id="manual-code" placeholder="0001" maxlength="10" inputmode="numeric" style="margin-bottom:10px" onkeydown="if(event.key==='Enter')manualAttend()">
      <button class="btn btn-success" onclick="manualAttend()"><i class="fa-solid fa-check-circle"></i> تسجيل حضور</button>
    </div>

    <div class="result-card" id="result-card">
      <div style="text-align:center">
        <div class="result-icon" id="result-icon"></div>
        <div class="result-title" id="result-title"></div>
        <div class="result-subtitle" id="result-subtitle"></div>
      </div>
      <div id="result-details"></div>
    </div>

    <div class="card">
      <div class="card-title"><i class="fa-solid fa-list-check"></i> سجل جلسة اليوم</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:12px;color:var(--muted2)">عدد التسجيلات: <b id="session-count" style="color:var(--blue2)">0</b></span>
        <span class="badge badge-blue" id="session-group-name">—</span>
      </div>
      <div class="log-list" id="session-log"></div>
    </div>
  </div>

  <!-- VIEW: HISTORY -->
  <div class="app-content" id="view-history" style="display:none">
    <div class="card">
      <div class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> سجل دخولي</div>
      <div id="my-logs" style="display:flex;flex-direction:column;gap:8px">
        <p style="text-align:center;color:var(--muted);font-size:13px">جاري التحميل...</p>
      </div>
    </div>
  </div>

  <!-- BOTTOM TAB -->
  <nav class="bottom-tab">
    <div class="tab-item active" id="tab-scan" onclick="switchTab('scan')"><i class="fa-solid fa-qrcode"></i>مسح</div>
    <div class="tab-item" id="tab-history" onclick="switchTab('history')"><i class="fa-solid fa-clock-rotate-left"></i>السجل</div>
    <div class="tab-item" onclick="doLogout()" style="color:var(--red)"><i class="fa-solid fa-power-off"></i>خروج</div>
  </nav>

</div>

<!-- CAMERA -->
<div class="camera-overlay" id="camera-overlay">
  <div class="camera-frame">
    <video id="camera-video" autoplay playsinline muted></video>
    <div class="scan-line"></div>
  </div>
  <div class="cam-status" id="cam-status">جاري تشغيل الكاميرا...</div>
  <button class="btn btn-danger" style="max-width:200px;margin-top:16px" onclick="closeCamera()"><i class="fa-solid fa-times"></i> إلغاء</button>
</div>

<script>
const firebaseConfig={
  apiKey:"AIzaSyAMBxp98hk1C9K7sEF8et0JpwzLWjTPZ_4",
  authDomain:"omnia-store-7c8e4.firebaseapp.com",
  databaseURL:"https://omnia-store-7c8e4-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"omnia-store-7c8e4",
  storageBucket:"omnia-store-7c8e4.firebasestorage.app",
  messagingSenderId:"840762940236",
  appId:"1:840762940236:web:b5ea870c11e475e9ab8de9"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let currentAssistant=null,currentAssistantKey=null;
let students={},groups={};
let cameraStream=null,codeReader=null;
let sessionLog=[];

window.onload=()=>{
  const saved=sessionStorage.getItem('assist_auth');
  if(saved){
    const data=JSON.parse(saved);
    currentAssistant=data.assistant;
    currentAssistantKey=data.key;
    startApp();
  }
};

function doLogin(){
  const code=document.getElementById('login-pass').value.trim();
  if(!code){showErr('أدخل الكود أولاً');return;}
  db.ref('app_configurations/assistants').once('value',snap=>{
    const assistants=snap.val()||{};
    let found=null,foundKey=null;
    Object.entries(assistants).forEach(([k,a])=>{
      if(String(a.code)===String(code)){found=a;foundKey=k;}
    });
    if(found){
      currentAssistant=found;currentAssistantKey=foundKey;
      sessionStorage.setItem('assist_auth',JSON.stringify({assistant:found,key:foundKey}));
      // Log login
      logAssistant('login');
      startApp();
    } else {
      showErr('❌ الكود غير صحيح — تحقق من كودك وأعد المحاولة');
      document.getElementById('login-pass').value='';
    }
  });
}

function showErr(msg){
  const el=document.getElementById('login-error');
  el.style.display='block';el.innerText=msg;
  setTimeout(()=>el.style.display='none',3000);
}

function doLogout(){
  if(!confirm('تأكيد تسجيل الخروج؟'))return;
  logAssistant('logout');
  sessionStorage.removeItem('assist_auth');
  document.getElementById('app-shell').style.display='none';
  document.getElementById('login-view').style.display='flex';
  document.getElementById('login-pass').value='';
  currentAssistant=null;currentAssistantKey=null;sessionLog=[];
}

function startApp(){
  document.getElementById('login-view').style.display='none';
  document.getElementById('app-shell').style.display='block';
  document.getElementById('header-user-name').innerText=currentAssistant.name;
  loadData();
}

function loadData(){
  db.ref('students_directory').on('value',snap=>students=snap.val()||{});
  db.ref('app_configurations/groups').on('value',snap=>groups=snap.val()||{});
}

function logAssistant(action){
  const now=new Date();
  db.ref(`assistant_logs/${currentAssistantKey}`).push({
    action,name:currentAssistant.name,
    date:now.toLocaleDateString('ar-EG'),
    time:now.toISOString(),
    timestamp:now.toLocaleString('ar-EG')
  });
}

function switchTab(tab){
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  document.getElementById('view-scan').style.display=tab==='scan'?'flex':'none';
  document.getElementById('view-history').style.display=tab==='history'?'flex':'none';
  if(tab==='history') loadMyHistory();
}

// ===== ATTENDANCE =====
function processAttendance(code){
  const uid=code.trim();
  const student=students[uid];
  const rc=document.getElementById('result-card');
  const rIcon=document.getElementById('result-icon');
  const rTitle=document.getElementById('result-title');
  const rSub=document.getElementById('result-subtitle');
  const rDet=document.getElementById('result-details');

  rc.style.display='block';
  if(!student){
    rc.className='result-card error';
    rIcon.innerText='❌';
    rTitle.innerText='طالب غير موجود!';
    rSub.innerText=`الكود "${uid}" غير مسجل في النظام`;
    rDet.innerHTML='';
    vibrate([100,50,100]);
    return;
  }

  const today=new Date().toISOString().slice(0,10);
  const gid=student.group_reference;
  db.ref(`attendance_ledger/${gid}/${today}/${uid}`).once('value',snap=>{
    if(snap.exists()){
      rc.className='result-card already';
      rIcon.innerText='⚠️';
      rTitle.innerText='تم التسجيل مسبقًا';
      rSub.innerText=`${student.name} مسجل حضوره بالفعل اليوم`;
      rDet.innerHTML=`<div class="student-info-row">
        <div><div class="student-info-label">وقت التسجيل</div><div class="student-info-val">${snap.val().timestamp||'—'}</div></div>
      </div>`;
      vibrate([200]);
      addToLog(student.name,uid,'already');
    } else {
      const now=new Date();
      const ts=now.toLocaleTimeString('ar-EG');
      db.ref(`attendance_ledger/${gid}/${today}/${uid}`).set({
        timestamp:ts,
        recorded_by:currentAssistant.name,
        date:today
      }).then(()=>{
        rc.className='result-card success';
        rIcon.innerText='✅';
        rTitle.innerText='تم تسجيل الحضور!';
        rSub.innerText='تم بنجاح';
        const g=groups[gid]?.title||'—';
        rDet.innerHTML=`<div class="student-info-row">
          <div><div class="student-info-label">الطالب</div><div class="student-info-val" style="color:var(--green2)">${student.name}</div></div>
          <div style="text-align:left"><div class="student-info-label">الكود</div><div class="student-info-val">${uid}</div></div>
        </div>
        <div class="student-info-row">
          <div><div class="student-info-label">المجموعة</div><div class="student-info-val">${g}</div></div>
          <div style="text-align:left"><div class="student-info-label">الوقت</div><div class="student-info-val">${ts}</div></div>
        </div>`;
        vibrate([50,20,50,20,100]);
        addToLog(student.name,uid,'success');
        // Deduct wallet
        const newBal=Math.max(0,parseInt(student.wallet_balance||0)-1);
        db.ref(`students_directory/${uid}/wallet_balance`).set(newBal);
      });
    }
  });
}

function addToLog(name,uid,type){
  const now=new Date().toLocaleTimeString('ar-EG');
  sessionLog.unshift({name,uid,type,time:now});
  document.getElementById('session-count').innerText=sessionLog.filter(l=>l.type==='success').length;
  const el=document.getElementById('session-log');
  el.innerHTML=sessionLog.slice(0,20).map(l=>`
    <div class="log-item">
      <div class="log-dot ${l.type==='success'?'success':l.type==='already'?'already':'err'}"></div>
      <div class="log-info">
        <div class="log-name">${l.name} <span style="font-size:10px;color:var(--muted)">(${l.uid})</span></div>
        <div class="log-time">${l.time} — ${l.type==='success'?'✅ تم التسجيل':l.type==='already'?'⚠️ مسجل مسبقًا':'❌ غير موجود'}</div>
      </div>
    </div>`).join('');
}

function manualAttend(){
  const code=document.getElementById('manual-code').value.trim();
  if(!code)return;
  document.getElementById('manual-code').value='';
  processAttendance(code);
}

// ===== CAMERA =====
function openCamera(){
  document.getElementById('camera-overlay').classList.add('open');
  document.getElementById('cam-status').innerText='جاري تشغيل الكاميرا...';

  if(window.ZXing){
    startZXing();
  } else {
    startBarcodeDetector();
  }
}

async function startBarcodeDetector(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    cameraStream=stream;
    const video=document.getElementById('camera-video');
    video.srcObject=stream;await video.play();
    if('BarcodeDetector' in window){
      document.getElementById('cam-status').innerText='وجّه الكاميرا نحو الباركود...';
      const detector=new BarcodeDetector({formats:['qr_code','ean_13','code_128','code_39','upc_a']});
      const loop=setInterval(async()=>{
        if(!cameraStream){clearInterval(loop);return;}
        try{
          const codes=await detector.detect(video);
          if(codes.length>0){
            clearInterval(loop);closeCamera();
            processAttendance(codes[0].rawValue);
          }
        }catch(e){}
      },300);
    } else {
      document.getElementById('cam-status').innerText='الكاميرا تعمل — استخدم قارئ خارجي أو الإدخال اليدوي';
    }
  }catch(err){
    document.getElementById('cam-status').innerText='❌ لا يمكن الوصول للكاميرا — تأكد من منح الإذن';
  }
}

function startZXing(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(stream=>{
    cameraStream=stream;
    const video=document.getElementById('camera-video');
    video.srcObject=stream;video.play();
    codeReader=new ZXing.BrowserMultiFormatReader();
    document.getElementById('cam-status').innerText='وجّه الكاميرا نحو الباركود...';
    codeReader.decodeFromStream(stream,video,(result,err)=>{
      if(result){closeCamera();processAttendance(result.getText());}
    });
  }).catch(()=>{
    document.getElementById('cam-status').innerText='❌ تعذر الوصول للكاميرا';
  });
}

function closeCamera(){
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}
  if(codeReader){try{codeReader.reset();}catch(e){}codeReader=null;}
  document.getElementById('camera-video').srcObject=null;
  document.getElementById('camera-overlay').classList.remove('open');
}

// ===== HISTORY =====
function loadMyHistory(){
  const el=document.getElementById('my-logs');
  el.innerHTML='<p style="text-align:center;color:var(--muted);font-size:13px">جاري التحميل...</p>';
  db.ref(`assistant_logs/${currentAssistantKey}`).limitToLast(30).once('value',snap=>{
    if(!snap.exists()){el.innerHTML='<p style="text-align:center;color:var(--muted);font-size:13px">لا توجد سجلات</p>';return;}
    const items=[];snap.forEach(c=>items.unshift(c.val()));
    el.innerHTML=items.map(l=>`<div class="log-item">
      <div class="log-dot ${l.action==='login'?'success':'err'}"></div>
      <div class="log-info">
        <div class="log-name">${l.action==='login'?'🔓 دخول':'🔒 خروج'}</div>
        <div class="log-time">${l.timestamp||'—'}</div>
      </div>
    </div>`).join('');
  });
}

// ===== UTILS =====
function vibrate(pattern){
  if(navigator.vibrate) navigator.vibrate(pattern);
}

// Close camera on escape
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCamera();});
window.addEventListener('click',e=>{
  if(e.target.id==='camera-overlay') closeCamera();
});
</script>
